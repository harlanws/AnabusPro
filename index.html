<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anabus Pro V11 - Benar/Salah Edition</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SheetJS (XLSX) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <!-- jsPDF & jsPDF-AutoTable untuk cetak PDF Super Rapi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
        .tab-inactive { color: #64748b; font-weight: 500; }
        .tab-inactive:hover { color: #1e293b; background-color: #f1f5f9; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .formula-box { background: #f1f5f9; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; font-family: 'Courier New', monospace; font-size: 0.9rem; color: #334155; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ICONS ---
        const IconUpload = () => <svg className="w-10 h-10 mb-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>;
        const IconDownload = () => <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>;
        const IconChart = () => <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>;
        const IconTable = () => <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h18M3 14h18m-9-4v8m-7-4h14M5 21l7-7 7 7"></path></svg>;
        const IconUsers = () => <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>;
        const IconTemplate = () => <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>;
        const IconInfo = () => <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>;
        const IconClose = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>;
        const IconSave = () => <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>;
        const IconFolder = () => <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path></svg>;
        const IconTrash = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>;
        const IconPDF = () => <svg className="w-4 h-4 mr-2 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>;

        // --- HELPER FUNCTIONS ---
        const calculateMean = (arr) => arr.length === 0 ? 0 : arr.reduce((a, b) => a + b, 0) / arr.length;
        const calculateVariance = (arr) => {
            if (arr.length <= 1) return 0;
            const mean = calculateMean(arr);
            return arr.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / (arr.length - 1);
        };
        const calculateSD = (arr) => Math.sqrt(calculateVariance(arr));
        const calculateCorrelation = (x, y) => {
            if (x.length !== y.length || x.length === 0) return 0;
            const n = x.length;
            const sumX = x.reduce((a, b) => a + b, 0);
            const sumY = y.reduce((a, b) => a + b, 0);
            const sumXY = x.reduce((sum, xi, i) => sum + xi * y[i], 0);
            const sumX2 = x.reduce((sum, xi) => sum + xi * xi, 0);
            const sumY2 = y.reduce((sum, yi) => sum + yi * yi, 0);
            const numerator = (n * sumXY) - (sumX * sumY);
            const denominator = Math.sqrt(((n * sumX2) - (sumX * sumX)) * ((n * sumY2) - (sumY * sumY)));
            return denominator === 0 ? 0 : numerator / denominator;
        };

        const chunkArray = (arr, size) => {
            return Array.from({ length: Math.ceil(arr.length / size) }, (v, i) =>
                arr.slice(i * size, i * size + size)
            );
        };

        // --- COMPONENTS ---
        function StatCard({ title, value, subtext, color = "blue" }) {
            const colors = {
                blue: "text-blue-700 bg-blue-50 border-blue-200",
                green: "text-emerald-700 bg-emerald-50 border-emerald-200",
                red: "text-rose-700 bg-rose-50 border-rose-200",
                purple: "text-indigo-700 bg-indigo-50 border-indigo-200",
                amber: "text-amber-700 bg-amber-50 border-amber-200",
            };
            return (
                <div className={`p-5 rounded-2xl border ${colors[color]} shadow-sm`}>
                    <div className="text-xs font-semibold uppercase tracking-wider opacity-70 mb-1">{title}</div>
                    <div className="text-3xl font-black tracking-tight">{value}</div>
                    {subtext && <div className="text-xs font-medium mt-1.5 opacity-80">{subtext}</div>}
                </div>
            );
        }

        function SaveSessionModal({ isOpen, onClose, onSave }) {
            const [name, setName] = useState('');
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900 bg-opacity-40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm animate-fade-in">
                        <h3 className="text-xl font-bold mb-1 text-slate-800">Simpan Sesi Analisis</h3>
                        <p className="text-sm text-slate-500 mb-4">Simpan data ini agar bisa dibuka kembali nanti.</p>
                        <input 
                            type="text" 
                            className="w-full border border-slate-300 p-3 rounded-xl mb-5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                            placeholder="Contoh: PH 1 Matematika 9A" 
                            value={name}
                            autoFocus
                            onChange={e => setName(e.target.value)}
                        />
                        <div className="flex justify-end gap-3">
                            <button onClick={onClose} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition-colors">Batal</button>
                            <button onClick={() => { onSave(name); setName(''); }} disabled={!name.trim()} className="px-5 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 transition-colors shadow-sm">Simpan</button>
                        </div>
                    </div>
                </div>
            );
        }

        function LoadSessionModal({ isOpen, onClose, sessions, onLoad, onDelete }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900 bg-opacity-40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[80vh] flex flex-col animate-fade-in">
                        <div className="p-5 border-b border-slate-100 flex justify-between items-center">
                            <h3 className="text-xl font-bold text-slate-800">Buka Sesi Tersimpan</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700 transition-colors"><IconClose /></button>
                        </div>
                        <div className="p-3 overflow-y-auto flex-1 bg-slate-50">
                            {sessions.length === 0 ? (
                                <div className="text-center py-12">
                                    <IconFolder className="w-12 h-12 text-slate-300 mx-auto mb-3" />
                                    <p className="text-slate-500 font-medium">Belum ada sesi yang tersimpan.</p>
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    {sessions.map(s => (
                                        <div key={s.id} className="flex justify-between items-center p-4 bg-white hover:bg-blue-50 rounded-xl border border-slate-200 hover:border-blue-200 transition-all shadow-sm group">
                                            <div onClick={() => onLoad(s)} className="flex-1 cursor-pointer">
                                                <div className="font-bold text-slate-800">{s.name}</div>
                                                <div className="text-xs text-slate-500 mt-1 flex gap-2">
                                                    <span className="bg-slate-100 px-2 py-0.5 rounded font-medium">
                                                        {s.type === 'pg_huruf' ? 'PG (A-E)' : (s.type === 'pg' ? 'PG (0/1)' : (s.type === 'bs' ? 'Benar/Salah' : 'Uraian'))}
                                                    </span>
                                                    <span>{new Date(s.timestamp).toLocaleString('id-ID', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                                                </div>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); onDelete(s.id); }} className="p-2 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100" title="Hapus Permanen">
                                                <IconTrash />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function FormulaModal({ isOpen, onClose }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900 bg-opacity-40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto animate-fade-in">
                         <div className="flex justify-between items-center p-6 border-b sticky top-0 bg-white z-10">
                            <h3 className="text-xl font-bold text-slate-800">Panduan & Rumus Analisis</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700"><IconClose/></button>
                         </div>
                         <div className="p-6 space-y-8 text-sm text-slate-700 leading-relaxed">
                             <section>
                                 <h4 className="font-bold text-blue-700 text-base mb-3 flex items-center"><span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center mr-2">1</span> Tingkat Kesukaran (P)</h4>
                                 <p className="mb-2">Proporsi siswa yang menjawab benar terhadap total siswa (atau rasio skor rata-rata terhadap skor maksimal pada soal uraian).</p>
                                 <div className="formula-box font-medium">P = Rata-rata Skor Butir / Skor Maksimal Butir</div>
                                 <div className="grid grid-cols-3 gap-2 mt-3">
                                     <div className="bg-rose-50 p-2 rounded border border-rose-100"><span className="font-bold text-rose-700">0.00 - 0.30</span><br/>Sukar</div>
                                     <div className="bg-emerald-50 p-2 rounded border border-emerald-100"><span className="font-bold text-emerald-700">0.31 - 0.70</span><br/>Sedang</div>
                                     <div className="bg-blue-50 p-2 rounded border border-blue-100"><span className="font-bold text-blue-700">0.71 - 1.00</span><br/>Mudah</div>
                                 </div>
                             </section>

                             <section>
                                 <h4 className="font-bold text-blue-700 text-base mb-3 flex items-center"><span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center mr-2">2</span> Daya Pembeda (D)</h4>
                                 <p className="mb-2">Kemampuan soal membedakan antara siswa kelompok atas (27% peraih skor tertinggi) dan kelompok bawah (27% peraih skor terendah).</p>
                                 <div className="formula-box font-medium">D = (Rata-rata Kelompok Atas - Rata-rata Kelompok Bawah) / Skor Maksimal</div>
                                 <ul className="list-none space-y-1 ml-2">
                                     <li><span className="font-bold text-emerald-600 w-24 inline-block">&ge; 0.40</span> : Sangat Baik (Pertahankan)</li>
                                     <li><span className="font-bold text-blue-600 w-24 inline-block">0.30 - 0.39</span> : Baik</li>
                                     <li><span className="font-bold text-amber-600 w-24 inline-block">0.20 - 0.29</span> : Cukup (Perlu Revisi)</li>
                                     <li><span className="font-bold text-rose-600 w-24 inline-block">&lt; 0.20</span> : Jelek (Buang / Revisi Total)</li>
                                     <li><span className="font-bold text-rose-800 w-24 inline-block">Negatif (-)</span> : Berbahaya (Siswa pintar salah, siswa kurang malah benar. Cek kunci jawaban!)</li>
                                 </ul>
                             </section>

                             <section>
                                 <h4 className="font-bold text-blue-700 text-base mb-3 flex items-center"><span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center mr-2">3</span> Validitas & Reliabilitas</h4>
                                 <p className="mb-2"><strong>Validitas (r)</strong>: Menggunakan korelasi Product Moment Pearson antara skor butir dengan skor total. Status 'Valid' di aplikasi ini menggunakan estimasi r-tabel konservatif (0.25).</p>
                                 <p><strong>Reliabilitas</strong>: Menggunakan Alpha Cronbach (ekuivalen dengan KR-20 untuk data dikotomi). Mengukur konsistensi tes secara keseluruhan.</p>
                                 <ul className="list-disc list-inside mt-2 text-slate-600 ml-2">
                                     <li>&gt; 0.70 : Reliabilitas Tinggi (Sangat Ajeg)</li>
                                     <li>0.40 - 0.70 : Reliabilitas Sedang</li>
                                     <li>&lt; 0.40 : Reliabilitas Rendah (Tes kurang dapat dipercaya)</li>
                                 </ul>
                             </section>

                             <section>
                                 <h4 className="font-bold text-blue-700 text-base mb-3 flex items-center"><span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center mr-2">4</span> Analisis Pengecoh (PG & B/S)</h4>
                                 <p>Opsi jawaban yang salah (distractor) dianggap berfungsi efektif jika dipilih oleh minimal 5% dari total peserta tes. Jika opsi pengecoh tidak dipilih siapapun (0%), opsi tersebut harus diganti.</p>
                             </section>
                         </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [file, setFile] = useState(null);
            const [examType, setExamType] = useState('pg_huruf');
            const [kkm, setKkm] = useState(75);
            const [activeTab, setActiveTab] = useState('analysis');
            const [analyzedData, setAnalyzedData] = useState(null);
            const [studentData, setStudentData] = useState(null);
            const [summary, setSummary] = useState(null);
            const [classStats, setClassStats] = useState(null);
            const [error, setError] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'id', direction: 'asc' });
            
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [showLoadModal, setShowLoadModal] = useState(false);
            const [showFormulaModal, setShowFormulaModal] = useState(false);
            const [savedSessions, setSavedSessions] = useState([]);

            const fileInputRef = useRef(null);

            useEffect(() => {
                const loaded = JSON.parse(localStorage.getItem('anabus_saves_v11') || '[]');
                setSavedSessions(loaded);
            }, []);

            const saveSessionInternal = (name) => {
                const newSession = { 
                    id: Date.now(), 
                    name, 
                    timestamp: new Date().toISOString(), 
                    type: examType, 
                    data: { examType, kkm, analyzedData, studentData, summary, classStats } 
                };
                const updatedSessions = [newSession, ...savedSessions];
                localStorage.setItem('anabus_saves_v11', JSON.stringify(updatedSessions));
                setSavedSessions(updatedSessions);
                setShowSaveModal(false);
            };

            const loadSessionInternal = (session) => {
                const { data } = session;
                setExamType(data.examType); 
                setKkm(data.kkm); 
                setAnalyzedData(data.analyzedData); 
                setStudentData(data.studentData); 
                setSummary(data.summary);
                setClassStats(data.classStats);
                setShowLoadModal(false);
                setError('');
            };

            const deleteSessionInternal = (id) => {
                if (confirm('Hapus sesi riwayat ini permanen?')) {
                    const updated = savedSessions.filter(s => s.id !== id);
                    localStorage.setItem('anabus_saves_v11', JSON.stringify(updated));
                    setSavedSessions(updated);
                }
            };

            const generateTemplate = () => {
                const headers = ["No", "Nama Siswa"];
                for (let i = 1; i <= 20; i++) { headers.push(i.toString()); }
                let data = [];
                if (examType === 'uraian') {
                    data.push(["", "Skor Maksimal", ...Array(20).fill(10)]); 
                    data.push(["1", "Ahmad Dahlan", ...Array(20).fill(8)]);
                } else if (examType === 'pg_huruf') {
                    const kunciExample = Array.from({length: 20}, (_, i) => String.fromCharCode(65 + (i % 5))); 
                    data.push(["", "Kunci Jawaban", ...kunciExample]); 
                    data.push(["1", "Budi Utomo", ...kunciExample.map(k => Math.random() > 0.2 ? k : 'A')]);
                } else if (examType === 'bs') {
                    const kunciExample = Array.from({length: 20}, (_, i) => i % 2 === 0 ? 'B' : 'S'); 
                    data.push(["", "Kunci Jawaban", ...kunciExample]); 
                    data.push(["1", "Budi Utomo", ...kunciExample.map(k => Math.random() > 0.2 ? k : (k === 'B' ? 'S' : 'B'))]);
                } else {
                    data.push(["1", "Citra Kirana", ...Array(20).fill(1)]);
                }

                const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
                ws['!cols'] = [{wch: 5}, {wch: 30}];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Template");
                
                let fileName = "Template_PG";
                if (examType === 'uraian') fileName = "Template_Uraian";
                if (examType === 'pg_huruf') fileName = "Template_PG_Huruf";
                if (examType === 'bs') fileName = "Template_Benar_Salah";

                XLSX.writeFile(wb, `${fileName}.xlsx`);
            };

            const handleFileUpload = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) { setFile(selectedFile); setError(''); }
            };

            const processFile = () => {
                if (!file) { setError('Silakan upload file terlebih dahulu.'); return; }
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        
                        const aoa = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName], { header: 1 });
                        let headerRowIndex = aoa.findIndex(row => {
                            if (!row || !Array.isArray(row)) return false;
                            const rowStr = row.join("").toLowerCase();
                            return (rowStr.includes("nama") || rowStr.includes("siswa") || rowStr.includes("no")) && row.length > 2;
                        });
                        
                        if (headerRowIndex === -1) headerRowIndex = 0; 
                        const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName], { range: headerRowIndex, defval: "" });
                        
                        if (jsonData.length === 0) { setError('Data tidak ditemukan di dalam file.'); return; }
                        analyzeData(jsonData);
                    } catch (err) { 
                        console.error(err);
                        setError('Gagal membaca file. Pastikan format Excel (.xlsx / .csv) valid dan tidak di-password.'); 
                    }
                };
                reader.readAsArrayBuffer(file);
            };

            const analyzeData = (rawData) => {
                const keys = Object.keys(rawData[0]);
                const ignoreCols = ['no', 'no.', 'nama', 'nama siswa', 'nis', 'nisn', 'kelas', 'l/p', 'total', 'skor', 'nilai', 'rank', 'keterangan'];
                
                const questionCols = keys.filter(k => {
                    const lowerK = String(k).toLowerCase().trim();
                    if (ignoreCols.some(ig => lowerK === ig || lowerK === ig+'.' || lowerK.includes(ig))) return false;
                    return /\d/.test(lowerK);
                });

                if (questionCols.length === 0) { 
                    setError(`Gagal mendeteksi kolom soal. Header terbaca: [${keys.slice(0,5).join(", ")}...]. Pastikan ada angka pada header soal (misal: "1", "2").`); 
                    return; 
                }

                let maxScores = {};
                let studentRows = [];
                let kunciJawaban = {}; 

                let nameKey = keys.find(k => /nama|siswa|peserta/i.test(String(k)));
                if (!nameKey) nameKey = keys[1]; 
                
                let noKey = keys.find(k => String(k).toLowerCase().trim() === 'no' || String(k).toLowerCase().trim() === 'no.');

                if (examType === 'uraian') {
                    const maxRowIndex = rawData.findIndex(row => {
                        const nameVal = String(row[nameKey] || "").toLowerCase();
                        return nameVal.includes("maksimal") || nameVal.includes("skor max") || nameVal.includes("nilai max") || nameVal === "max" || nameVal === "maks";
                    });

                    if (maxRowIndex !== -1) {
                        const maxRow = rawData[maxRowIndex];
                        questionCols.forEach(q => maxScores[q] = parseFloat(maxRow[q]) || 1);
                        studentRows = rawData.filter((_, idx) => idx !== maxRowIndex);
                    } else {
                        questionCols.forEach(q => {
                            const maxVal = Math.max(...rawData.map(row => parseFloat(row[q] || 0)));
                            maxScores[q] = maxVal > 0 ? maxVal : 1;
                        });
                        studentRows = rawData;
                    }
                } else if (examType === 'pg_huruf' || examType === 'bs') {
                    const kunciRowIndex = rawData.findIndex(row => {
                        const nameVal = String(row[nameKey] || "").toLowerCase();
                        return nameVal.includes("kunci");
                    });

                    if (kunciRowIndex === -1) {
                        setError(`Baris "Kunci Jawaban" tidak ditemukan! Tambahkan baris khusus bernama "Kunci Jawaban" di bawah header.`);
                        return;
                    }

                    const kunciRow = rawData[kunciRowIndex];
                    questionCols.forEach(q => {
                        kunciJawaban[q] = String(kunciRow[q] || "").trim().toUpperCase(); 
                        maxScores[q] = 1; 
                    });
                    
                    studentRows = rawData.filter((_, idx) => idx !== kunciRowIndex);
                } else {
                    questionCols.forEach(q => maxScores[q] = 1);
                    studentRows = rawData;
                }

                studentRows = studentRows.filter(row => {
                     let nameVal = String(row[nameKey] || "").trim();
                     const noVal = String(row[noKey] || "").trim();
                     
                     // Pembersihan karakter new line dari string nama untuk PDF Layout
                     nameVal = nameVal.replace(/[\n\r]+/g, ' ').replace(/\s{2,}/g, ' ').trim();
                     row[nameKey] = nameVal;

                     const nameLower = nameVal.toLowerCase();
                     const isRekap = nameLower.includes("rata-rata") || nameLower.includes("rata rata") || nameLower === "rata" || nameLower.includes("jumlah") || nameLower === "max" || nameLower === "min" || nameLower.includes("tertinggi") || nameLower.includes("terendah");
                     if (isRekap) return false;
                     return noVal !== "" || nameVal !== "";
                });

                if (studentRows.length === 0) { 
                    setError("Data siswa kosong setelah proses pembersihan data."); 
                    return; 
                }

                let distractorData = {};
                if (examType === 'pg_huruf') {
                    questionCols.forEach(q => { distractorData[q] = { A:0, B:0, C:0, D:0, E:0, Kosong:0 }; });
                } else if (examType === 'bs') {
                    questionCols.forEach(q => { distractorData[q] = { B:0, S:0, Kosong:0 }; });
                }

                const students = studentRows.map((row, idx) => {
                    let rawScore = 0;
                    let totalMaxPossible = 0;
                    const itemScores = {};
                    
                    questionCols.forEach(q => {
                        let score = 0;
                        if (examType === 'pg_huruf' || examType === 'bs') {
                            let studentAns = String(row[q] || "").trim().toUpperCase();
                            if(examType === 'pg_huruf' && (studentAns === 'A.' || studentAns === 'A)')) studentAns = 'A';
                            
                            const correctAnsStr = kunciJawaban[q] || "";
                            const correctAnswers = correctAnsStr.split(',').map(ans => ans.trim().toUpperCase());
                            
                            score = (studentAns !== "" && correctAnswers.includes(studentAns)) ? 1 : 0;
                            
                            if (distractorData[q] && distractorData[q][studentAns] !== undefined) {
                                distractorData[q][studentAns]++;
                            } else if (studentAns === "") {
                                distractorData[q]['Kosong']++;
                            }
                            itemScores[`${q}_ans`] = studentAns;

                        } else {
                            score = parseFloat(row[q] || 0);
                        }
                        
                        itemScores[q] = score;
                        rawScore += score;
                        totalMaxPossible += maxScores[q];
                    });
                    
                    const finalScore = totalMaxPossible > 0 ? (rawScore / totalMaxPossible) * 100 : 0;
                    let name = row[nameKey];
                    if (!name || String(name).trim() === "") name = `Siswa No. ${row[noKey] || (idx + 1)}`;
                    
                    return { id: idx + 1, name, rawScore, finalScore: parseFloat(finalScore.toFixed(2)), itemScores, status: finalScore >= kkm ? 'Tuntas' : 'Belum Tuntas' };
                });

                students.sort((a, b) => b.rawScore - a.rawScore);
                const groupSize = Math.max(1, Math.ceil(0.27 * students.length));
                const upperGroup = students.slice(0, groupSize);
                const lowerGroup = students.slice(students.length - groupSize);

                let sumItemVars = 0;
                const itemResults = questionCols.map(q => {
                    const allScores = students.map(s => s.itemScores[q]);
                    const upperScores = upperGroup.map(s => s.itemScores[q]);
                    const lowerScores = lowerGroup.map(s => s.itemScores[q]);
                    const currentMax = maxScores[q];

                    const meanVal = calculateMean(allScores);
                    const pVal = currentMax > 0 ? meanVal / currentMax : 0;
                    const dVal = currentMax > 0 ? (calculateMean(upperScores) - calculateMean(lowerScores)) / currentMax : 0;
                    const validity = calculateCorrelation(allScores, students.map(s => s.rawScore));
                    sumItemVars += calculateVariance(allScores);

                    let pCat = pVal > 0.7 ? "Mudah" : (pVal < 0.3 ? "Sukar" : "Sedang");
                    let dCat = dVal >= 0.4 ? "Sangat Baik" : (dVal >= 0.3 ? "Baik" : (dVal >= 0.2 ? "Cukup" : (dVal >= 0 ? "Jelek" : "Jelek (-)")));
                    
                    let decision = "Dipakai";
                    if (dVal < 0 || validity < 0) decision = "Dibuang";
                    else if (dVal < 0.2) decision = "Revisi/Buang";
                    else if (pCat !== "Sedang" && dCat === "Cukup") decision = "Revisi";

                    let distractorObj = null;
                    if (examType === 'pg_huruf' || examType === 'bs') {
                        const totalN = students.length;
                        distractorObj = {};
                        const opts = examType === 'pg_huruf' ? ['A','B','C','D','E'] : ['B','S'];
                        opts.forEach(opt => {
                            const count = distractorData[q][opt];
                            const pct = Math.round((count / totalN) * 100);
                            const isKey = kunciJawaban[q].includes(opt);
                            const isEffective = !isKey && pct >= 5;
                            distractorObj[opt] = { count, pct, isKey, isEffective };
                        });
                    }

                    return { 
                        id: q, p: pVal, pCat, d: dVal, dCat, validity, 
                        valStatus: validity > 0.25 ? "Valid" : "Tdk Valid", 
                        decision, maxScore: currentMax,
                        distractorData: distractorObj,
                        keyAns: (examType === 'pg_huruf' || examType === 'bs') ? kunciJawaban[q] : null
                    };
                });

                const allFinalScores = students.map(s => s.finalScore);
                const classMean = calculateMean(allFinalScores);
                const classSD = calculateSD(allFinalScores);
                const classMax = Math.max(...allFinalScores);
                const classMin = Math.min(...allFinalScores);

                const cStats = {
                    mean: classMean.toFixed(1),
                    sd: classSD.toFixed(2),
                    max: classMax,
                    min: classMin
                };

                const totalScoreVar = calculateVariance(students.map(s => s.rawScore));
                const reliability = totalScoreVar > 0 ? (questionCols.length / (questionCols.length - 1)) * (1 - (sumItemVars / totalScoreVar)) : 0;

                const acceptedCount = itemResults.filter(i => i.decision === 'Dipakai').length;
                const relCat = reliability > 0.7 ? "Sangat Reliabel" : (reliability > 0.4 ? "Cukup Reliabel" : "Kurang Reliabel");
                const narrative = `Berdasarkan analisis terhadap ${students.length} peserta tes dan ${questionCols.length} butir soal, instrumen ini memiliki Reliabilitas sebesar ${reliability.toFixed(3)} (${relCat}). Rata-rata nilai kelas adalah ${cStats.mean} dengan simpangan baku ${cStats.sd}. Terdapat ${acceptedCount} soal (${Math.round(acceptedCount/questionCols.length*100)}%) yang dinyatakan VALID dan direkomendasikan untuk DIPAKAI pada bank soal. Sisanya direkomendasikan untuk direvisi atau dibuang karena memiliki daya pembeda yang rendah atau tingkat kesukaran yang tidak proporsional.`;

                setSummary({ studentCount: students.length, itemCount: questionCols.length, reliability: reliability.toFixed(3), relCat, accepted: acceptedCount, tuntas: students.filter(s => s.status === 'Tuntas').length, narrative });
                setClassStats(cStats);
                setAnalyzedData(itemResults);
                setStudentData(students.sort((a,b) => a.id - b.id));
                setError(''); 
            };

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const sortedData = useMemo(() => {
                if (!analyzedData) return [];
                let sortable = [...analyzedData];
                if (sortConfig.key) {
                    sortable.sort((a, b) => {
                        let valA = a[sortConfig.key], valB = b[sortConfig.key];
                        if (sortConfig.key === 'id') { 
                            valA = parseFloat(String(valA).replace(/[^\d.-]/g, '')) || valA; 
                            valB = parseFloat(String(valB).replace(/[^\d.-]/g, '')) || valB; 
                        }
                        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return sortable;
            }, [analyzedData, sortConfig]);

            const downloadExcel = () => {
                const wb = XLSX.utils.book_new();
                
                const analysisRows = analyzedData.map(i => {
                    let row = { "No Soal": i.id, "Skor Maks": i.maxScore, "Kesukaran (P)": i.p.toFixed(3), "Kategori P": i.pCat, "Daya Beda (D)": i.d.toFixed(3), "Kategori D": i.dCat, "Validitas (r)": i.validity.toFixed(3), "Status": i.valStatus, "Keputusan": i.decision };
                    if(i.distractorData) {
                        row["Kunci"] = i.keyAns;
                        if (examType === 'pg_huruf') {
                            ['A','B','C','D','E'].forEach(opt => row[`Jawab ${opt} (%)`] = `${i.distractorData[opt].pct}%`);
                        } else if (examType === 'bs') {
                            ['B','S'].forEach(opt => row[`Jawab ${opt} (%)`] = `${i.distractorData[opt].pct}%`);
                        }
                    }
                    return row;
                });
                
                analysisRows.push({}, {"No Soal": "KESIMPULAN ANALISIS:"}, {"No Soal": summary.narrative});
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(analysisRows), "Analisis Butir Soal");
                
                const studentRows = studentData.map(s => ({ "No Urut": s.id, "Nama Siswa": s.name, "Skor Mentah": s.rawScore, "Nilai Akhir": s.finalScore, "Keterangan": s.status }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(studentRows), "Daftar Nilai");
                
                XLSX.writeFile(wb, "Laporan_Anabus_Ultimate.xlsx");
            };

            const downloadPDFDocument = () => {

                drawCard(marginX + (boxWidth + gap)*2, "RATA-RATA KELAS", `${classStats.mean}`, `SD: ${classStats.sd}`, [217, 119, 6]);
                drawCard(marginX + (boxWidth + gap)*3, "KETUNTASAN", `${Math.round((summary.tuntas/summary.studentCount)*100)} %`, `${summary.tuntas} Tuntas`, [5, 150, 105]);


                // --- A. ANALISIS BUTIR SOAL ---

                    ? [['No', 'Kesukaran (P)', 'Daya Beda (D)', 'Validitas (r)', 'Kunci', 'Distribusi', 'Keputusan']]
                    : (examType === 'uraian' 
                        ? [['No', 'Skor Maks', 'Kesukaran (P)', 'Daya Beda (D)', 'Validitas (r)', 'Keputusan']]
                        : [['No', 'Kesukaran (P)', 'Daya Beda (D)', 'Validitas (r)', 'Keputusan']]);

                const bodyAnalisis = sortedData.map(item => {
                    const row = [];

                                const distStr2 = `D: ${item.distractorData['D'].pct}%   E: ${item.distractorData['E'].pct}%`;

                            }

                            row.push("-");

                    }
                    
                    row.push(item.decision);
                    return row;
                });

                doc.autoTable({

                    body: bodyAnalisis,
                    theme: 'grid',
                    styles: { fontSize: 8, cellPadding: 3, textColor: [30, 41, 59], lineColor: [203, 213, 225], valign: 'middle' },
                    headStyles: { fillColor: [226, 232, 240], textColor: [15, 23, 42], fontStyle: 'bold', halign: 'center' },
                    columnStyles: {

                        3: { halign: 'center', cellWidth: 26 }, 
                        4: (examType === 'pg_huruf' || examType === 'bs') ? { halign: 'center', cellWidth: 15 } : { halign: 'center' }, 
                        5: (examType === 'pg_huruf' || examType === 'bs') ? { halign: 'center', cellWidth: 50 } : {}, 
                        6: { halign: 'center', fontStyle: 'bold' } 
                    },
                    didParseCell: function (data) {
                        if (data.section === 'body') {
                            const text = data.cell.text.join(' ');

                            if (text.includes('Tidak Valid')) data.cell.styles.textColor = [225, 29, 72];

                            if (text === 'Dibuang') { data.cell.styles.textColor = [225, 29, 72]; }
                            if (text.includes('Revisi')) { data.cell.styles.textColor = [217, 119, 6]; }
                        }
                    }
                });

                // Kesimpulan Deskriptif
                let finalY = doc.lastAutoTable.finalY + 10;
                if (finalY > 260) {
                    doc.addPage();
                    finalY = 20;
                }

                doc.setFillColor(240, 253, 250); 
                doc.setDrawColor(204, 251, 241); 
                doc.rect(14, finalY, 182, 25, 'FD');
                doc.setFontSize(9);
                doc.setFont("helvetica", "bold");
                doc.setTextColor(15, 118, 110);
                doc.text("Kesimpulan Deskriptif:", 18, finalY + 6);
                
                doc.setFont("helvetica", "normal");
                doc.setTextColor(30, 41, 59);
                const splitNarrative = doc.splitTextToSize(summary.narrative, 174);
                doc.text(splitNarrative, 18, finalY + 12);

                    }
                });

            const DistractorBar = ({ data, opt }) => {

                    <div className="flex flex-col items-center mx-1 group relative">

                        <div className="w-4 h-10 bg-slate-100 rounded-sm flex items-end overflow-hidden">
                            <div className={`w-full rounded-sm ${info.isKey ? 'bg-emerald-400' : (info.isEffective ? 'bg-amber-400' : 'bg-slate-300')}`} style={{height: `${Math.max(info.pct, 2)}%`}}></div>
                        </div>
                        <div className={`text-[10px] font-bold mt-1 ${info.isKey ? 'text-emerald-600' : 'text-slate-600'}`}>{opt}</div>
                        
                        <div className="absolute bottom-full mb-1 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap z-10">
                            {info.count} siswa
                            {!info.isKey && info.isEffective && " (Pengecoh Baik)"}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen text-slate-800 relative bg-slate-50">
                    <SaveSessionModal isOpen={showSaveModal} onClose={() => setShowSaveModal(false)} onSave={saveSessionInternal} />
                    <LoadSessionModal isOpen={showLoadModal} onClose={() => setShowLoadModal(false)} sessions={savedSessions} onLoad={loadSessionInternal} onDelete={deleteSessionInternal} />
                    <FormulaModal isOpen={showFormulaModal} onClose={() => setShowFormulaModal(false)} />

                    {/* TOP NAVBAR */}
                    <nav className="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-40 shadow-sm">
                        <div className="flex justify-between items-center max-w-7xl mx-auto">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-inner">A</div>
                                <div>
                                    <div className="text-xl font-bold tracking-tight text-slate-900 leading-none">Anabus<span className="text-blue-600">Pro</span> <span className="text-xs font-black bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded uppercase tracking-widest align-top ml-1">V11</span></div>
                                    <div className="text-[11px] text-slate-500 font-medium tracking-wide">ULTIMATE EDITION</div>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setShowFormulaModal(true)} className="flex items-center text-slate-600 hover:text-blue-600 px-3 py-2 bg-slate-100 hover:bg-blue-50 rounded-lg text-sm font-semibold transition-colors"><IconInfo /> Panduan</button>
                                {summary && (
                                    <>
                                        <button onClick={downloadPDFDocument} className="flex items-center bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                                            <IconPDF /> Simpan PDF
                                        </button>
                                        <button onClick={downloadExcel} className="flex items-center bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-md hover:shadow-lg"><IconDownload /> Export Excel</button>
                                    </>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-6 md:p-8">
                        
                        {/* WORKSPACE AREA */}
                        <div className="workspace-area">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-wrap justify-between items-center gap-4">
                                <div>
                                    <h3 className="font-bold text-slate-800 text-sm">Workspace & Session</h3>
                                    <p className="text-xs text-slate-500 mt-0.5">Simpan pekerjaan Anda atau buka kembali kelas yang pernah dianalisis.</p>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowSaveModal(true)} disabled={!summary} className={`flex items-center border border-blue-200 text-blue-700 hover:bg-blue-50 px-4 py-2 rounded-xl text-sm font-semibold transition-colors ${!summary ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                        <IconSave /> Simpan Sesi
                                    </button>
                                    <button onClick={() => setShowLoadModal(true)} className="flex items-center bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm font-semibold transition-colors shadow-sm relative">
                                        <IconFolder /> Buka Sesi
                                        {savedSessions.length > 0 && <span className="absolute -top-2 -right-2 bg-rose-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">{savedSessions.length}</span>}
                                    </button>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-8">
                                <div className="grid lg:grid-cols-5 gap-8 items-start">
                                    {/* UPLOAD SECTION */}
                                    <div className="lg:col-span-2 bg-slate-50 p-6 rounded-2xl border border-slate-100 h-full flex flex-col justify-center">
                                        <div className="flex justify-between items-center mb-4">
                                            <label className="block font-bold text-slate-800">1. Upload File Excel</label>
                                            <button onClick={generateTemplate} className="text-xs text-blue-600 font-bold hover:text-blue-800 bg-blue-100 hover:bg-blue-200 px-3 py-1.5 rounded-lg transition-colors flex items-center"><IconTemplate /> Template</button>
                                        </div>
                                        <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed border-blue-300 bg-white rounded-xl py-10 flex flex-col items-center justify-center cursor-pointer hover:border-blue-500 hover:shadow-md transition-all group">
                                            <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".csv,.xlsx" className="hidden" />
                                            {file ? (
                                                <div className="text-center px-4">
                                                    <div className="text-blue-700 font-bold truncate max-w-[200px] bg-blue-50 px-3 py-1 rounded-lg inline-block mb-2">{file.name}</div>
                                                    <div className="text-xs text-slate-400">Klik untuk mengganti file</div>
                                                </div>
                                            ) : (
                                                <>
                                                    <IconUpload />
                                                    <span className="text-sm font-semibold text-slate-600 group-hover:text-blue-600">Drop file atau Klik Disini</span>
                                                    <span className="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">.XLSX atau .CSV</span>
                                                </>
                                            )}
                                        </div>
                                    </div>

                                    {/* SETTINGS SECTION */}
                                    <div className="lg:col-span-3 flex flex-col justify-between h-full">
                                        <div className="mb-6">
                                            <label className="block font-bold text-slate-800 mb-3">2. Pengaturan Analisis</label>
                                            
                                            {/* UI BARU UNTUK JENIS INSTRUMEN */}
                                            <div className="mb-5">
                                                <span className="text-[11px] font-bold text-slate-500 uppercase tracking-wider block mb-2">Pilih Jenis Instrumen:</span>
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                                    <button 
                                                        onClick={() => setExamType('pg_huruf')} 
                                                        className={`py-3 px-2 rounded-xl text-xs font-bold border-2 transition-all ${examType === 'pg_huruf' ? 'bg-blue-50 border-blue-500 text-blue-700 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300 hover:bg-slate-50'}`}
                                                    >
                                                        PG (A/B/C/D/E)
                                                    </button>
                                                    <button 
                                                        onClick={() => setExamType('pg')} 
                                                        className={`py-3 px-2 rounded-xl text-xs font-bold border-2 transition-all ${examType === 'pg' ? 'bg-blue-50 border-blue-500 text-blue-700 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300 hover:bg-slate-50'}`}
                                                    >
                                                        PG (Angka 0/1)
                                                    </button>
                                                    <button 
                                                        onClick={() => setExamType('bs')} 
                                                        className={`py-3 px-2 rounded-xl text-xs font-bold border-2 transition-all ${examType === 'bs' ? 'bg-blue-50 border-blue-500 text-blue-700 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300 hover:bg-slate-50'}`}
                                                    >
                                                        Benar/Salah (B/S)
                                                    </button>
                                                    <button 
                                                        onClick={() => setExamType('uraian')} 
                                                        className={`py-3 px-2 rounded-xl text-xs font-bold border-2 transition-all ${examType === 'uraian' ? 'bg-blue-50 border-blue-500 text-blue-700 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300 hover:bg-slate-50'}`}
                                                    >
                                                        Uraian (Skor)
                                                    </button>
                                                </div>
                                            </div>

                                            <div>
                                                <span className="text-[11px] font-bold text-slate-500 uppercase tracking-wider block mb-2">Target KKM:</span>
                                                <div className="relative w-1/2 md:w-1/3">
                                                    <input 
                                                        type="number" 
                                                        value={kkm} 
                                                        onChange={(e) => setKkm(e.target.value === '' ? '' : Number(e.target.value))} 
                                                        className="w-full bg-white border-2 border-slate-200 rounded-xl pl-4 pr-12 py-2.5 text-sm font-bold text-slate-800 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" 
                                                    />
                                                    <span className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 font-bold">/ 100</span>
                                                </div>
                                            </div>
                                        </div>

                                        <button onClick={processFile} disabled={!file} className={`w-full py-4 rounded-xl font-bold text-base uppercase tracking-wider transition-all shadow-md mt-auto ${!file ? 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:from-blue-700 hover:to-indigo-700 hover:shadow-lg transform hover:-translate-y-0.5'}`}>
                                            Mulai Analisis Data
                                        </button>
                                    </div>
                                </div>
                                {error && (
                                    <div className="mt-6 p-4 bg-rose-50 border border-rose-200 text-rose-700 rounded-xl text-sm flex items-start animate-fade-in">
                                        <span className="mr-3 text-lg mt-0.5">⚠️</span> 
                                        <div><p className="font-bold mb-1">Analisis Gagal:</p><p>{error}</p></div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* DASHBOARD RESULTS */}
                        {summary && analyzedData && (
                            <div className="animate-fade-in">
                                {/* STATS ROW */}
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                                    <StatCard title="Reliabilitas" value={summary.reliability} subtext={summary.relCat} color="purple" />
                                    <StatCard title="Total Siswa" value={summary.studentCount} subtext="Peserta Tes" color="blue" />
                                    <StatCard title="Rata-rata" value={classStats?.mean || 0} subtext={`Max: ${classStats?.max}, Min: ${classStats?.min}`} color="amber" />
                                    <StatCard title="Ketuntasan" value={`${Math.round((summary.tuntas/summary.studentCount)*100)}%`} subtext={`${summary.tuntas} Tuntas, ${summary.studentCount - summary.tuntas} Remedial`} color="green" />
                                    <StatCard title="Soal Valid" value={summary.accepted} subtext={`Dari ${summary.itemCount} Soal`} color="blue" />
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[600px]">
                                    {/* TAB HEADERS */}
                                    <div className="flex border-b border-slate-200 bg-slate-50 overflow-x-auto">
                                        <button onClick={() => setActiveTab('analysis')} className={`px-6 py-4 flex items-center gap-2 text-sm whitespace-nowrap transition-colors ${activeTab === 'analysis' ? 'tab-active bg-white' : 'tab-inactive'}`}><IconChart /> Analisis Butir Soal</button>
                                        <button onClick={() => setActiveTab('students')} className={`px-6 py-4 flex items-center gap-2 text-sm whitespace-nowrap transition-colors ${activeTab === 'students' ? 'tab-active bg-white' : 'tab-inactive'}`}><IconTable /> Rekapitulasi Nilai</button>
                                        <button onClick={() => setActiveTab('remedial')} className={`px-6 py-4 flex items-center gap-2 text-sm whitespace-nowrap transition-colors ${activeTab === 'remedial' ? 'tab-active bg-white' : 'tab-inactive'}`}><IconUsers /> Remedial & Pengayaan</button>
                                    </div>

                                    <div className="p-0 sm:p-6">
                                        {/* TAB 1: ANALISIS */}
                                        <div className={activeTab === 'analysis' ? 'block' : 'hidden'}>
                                            <div>
                                                <div className="overflow-x-auto mb-6">
                                                    <table className="w-full text-sm text-left">
                                                        <thead className="bg-slate-100 text-slate-700 font-bold uppercase text-xs">
                                                            <tr>
                                                                <th className="px-4 py-4 cursor-pointer hover:bg-slate-200" onClick={() => handleSort('id')}>No {sortConfig.key==='id'&&(sortConfig.direction==='asc'?'↑':'↓')}</th>
                                                                {examType === 'uraian' && <th className="px-4 py-4 text-center">Skor Maks</th>}
                                                                <th className="px-4 py-4 cursor-pointer hover:bg-slate-200" onClick={() => handleSort('p')}>Kesukaran (P)</th>
                                                                <th className="px-4 py-4 cursor-pointer hover:bg-slate-200" onClick={() => handleSort('d')}>Daya Beda (D)</th>
                                                                <th className="px-4 py-4 cursor-pointer hover:bg-slate-200" onClick={() => handleSort('validity')}>Validitas (r)</th>
                                                                {(examType === 'pg_huruf' || examType === 'bs') && <th className="px-4 py-4 text-center w-48">Distribusi Jawaban</th>}
                                                                <th className="px-4 py-4">Keputusan</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {sortedData.map((item, idx) => (
                                                                <tr key={idx} className="hover:bg-slate-50">
                                                                    <td className="px-4 py-3 font-bold text-center">{item.id}</td>
                                                                    {examType === 'uraian' && <td className="px-4 py-3 text-slate-500 font-mono text-center bg-slate-50">{item.maxScore}</td>}
                                                                    
                                                                    <td className="px-4 py-3">
                                                                        <div className="flex items-center justify-between">
                                                                            <span className="font-semibold">{item.p.toFixed(2)}</span>
                                                                            <span className={`text-[10px] uppercase font-bold tracking-wider ${item.pCat==='Sedang'?'text-emerald-600':(item.pCat==='Mudah'?'text-blue-600':'text-rose-600')}`}>{item.pCat}</span>
                                                                        </div>
                                                                        <div className="w-full h-1 bg-slate-200 rounded-full mt-1.5 overflow-hidden">
                                                                            <div className={`h-full ${item.pCat==='Sedang'?'bg-emerald-500':(item.pCat==='Mudah'?'bg-blue-500':'bg-rose-500')}`} style={{width: `${Math.min(item.p * 100, 100)}%`}}></div>
                                                                        </div>
                                                                    </td>

                                                                    <td className="px-4 py-3">
                                                                        <div className="flex items-center justify-between">
                                                                            <span className={`font-bold ${item.d<0.2?'text-rose-600':'text-slate-800'}`}>{item.d.toFixed(2)}</span>
                                                                            <span className="text-[10px] text-slate-500 uppercase tracking-wider">{item.dCat}</span>
                                                                        </div>
                                                                    </td>

                                                                    <td className="px-4 py-3 text-center">
                                                                        <div className="font-semibold">{item.validity.toFixed(2)}</div>
                                                                        <div className={`text-[10px] font-bold uppercase mt-0.5 ${item.valStatus==='Valid'?'text-emerald-600':'text-rose-600'}`}>{item.valStatus}</div>
                                                                    </td>

                                                                    {(examType === 'pg_huruf' || examType === 'bs') && (
                                                                        <td className="px-4 py-2 bg-slate-50/50">
                                                                            {item.distractorData ? (
                                                                                <div className="flex justify-center h-16 pt-2">
                                                                                    {(examType === 'pg_huruf' ? ['A','B','C','D','E'] : ['B','S']).map(opt => <DistractorBar key={opt} data={item.distractorData} opt={opt} />)}
                                                                                </div>
                                                                            ) : <span className="text-xs text-slate-400">N/A</span>}
                                                                        </td>
                                                                    )}

                                                                    <td className="px-4 py-3">
                                                                        <span className={`px-3 py-1.5 rounded-lg text-xs font-bold w-full block text-center border ${item.decision==='Dipakai'?'bg-emerald-50 text-emerald-700 border-emerald-200':(item.decision==='Dibuang'?'bg-rose-50 text-rose-700 border-rose-200':'bg-amber-50 text-amber-700 border-amber-200')}`}>
                                                                            {item.decision}
                                                                        </span>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>

                                                <div className="bg-indigo-50 border border-indigo-100 rounded-2xl p-6 mt-8 shadow-sm">
                                                    <h3 className="text-lg font-black text-indigo-900 mb-3 flex items-center"><IconChart/> Kesimpulan Deskriptif</h3>
                                                    <p className="text-indigo-800 leading-relaxed font-medium">{summary.narrative}</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* TAB 2: STUDENTS */}
                                        <div className={activeTab === 'students' ? 'block' : 'hidden'}>
                                            <div>
                                                <div className="grid grid-cols-3 gap-4 mb-6">
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                        <div className="text-xs text-slate-500 font-bold uppercase">Nilai Tertinggi</div>
                                                        <div className="text-xl font-black text-slate-800">{classStats?.max}</div>
                                                    </div>
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                        <div className="text-xs text-slate-500 font-bold uppercase">Nilai Terendah</div>
                                                        <div className="text-xl font-black text-slate-800">{classStats?.min}</div>
                                                    </div>
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                        <div className="text-xs text-slate-500 font-bold uppercase">Standar Deviasi</div>
                                                        <div className="text-xl font-black text-slate-800">{classStats?.sd}</div>
                                                    </div>
                                                </div>

                                                <div className="overflow-x-auto border border-slate-200 rounded-xl">
                                                    <table className="w-full text-sm text-left">
                                                        <thead className="bg-slate-100 text-slate-700 font-bold uppercase text-xs">
                                                            <tr>
                                                                <th className="px-6 py-4 w-16">Rank</th>
                                                                <th className="px-6 py-4">Nama Peserta Didik</th>
                                                                <th className="px-6 py-4 text-center">Skor Mentah</th>
                                                                <th className="px-6 py-4 text-center text-blue-700">Nilai Akhir</th>
                                                                <th className="px-6 py-4 text-center">Status</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {[...studentData].sort((a,b)=>b.finalScore-a.finalScore).map((s, idx) => (
                                                                <tr key={idx} className="hover:bg-slate-50">
                                                                    <td className="px-6 py-3 text-slate-400 font-bold">#{idx+1}</td>
                                                                    <td className="px-6 py-3 font-semibold text-slate-800">{s.name}</td>
                                                                    <td className="px-6 py-3 text-center text-slate-500">{s.rawScore.toFixed(1)}</td>
                                                                    <td className="px-6 py-3 text-center font-black text-base">{s.finalScore}</td>
                                                                    <td className="px-6 py-3 text-center">
                                                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${s.status==='Tuntas'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}`}>{s.status}</span>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>

                                        {/* TAB 3: REMEDIAL */}
                                        <div className={activeTab === 'remedial' ? 'block' : 'hidden'}>
                                            <div>
                                                <div className="grid md:grid-cols-2 gap-8">
                                                    {/* REMEDIAL BOX */}
                                                    <div className="bg-white rounded-2xl border-2 border-rose-100 overflow-hidden shadow-sm">
                                                        <div className="bg-rose-50 px-6 py-4 border-b border-rose-100 flex justify-between items-center">
                                                            <h3 className="font-bold text-rose-800 flex items-center"><span className="w-2 h-2 bg-rose-500 rounded-full mr-2"></span>Peserta Remedial</h3>
                                                            <span className="bg-rose-200 text-rose-800 text-xs font-bold px-2 py-1 rounded-lg">&lt; {kkm}</span>
                                                        </div>
                                                        <div className="p-6">
                                                            <div className="text-xs text-slate-500 mb-4 pb-4 border-b">
                                                                <strong>Rencana Tindak Lanjut:</strong> Pembelajaran ulang secara klasikal untuk materi yang sulit, dilanjutkan dengan tes perbaikan.
                                                            </div>
                                                            <ul className="space-y-2 max-h-[500px] overflow-y-auto pr-2">
                                                                {studentData.filter(s => s.status === 'Belum Tuntas').map((s, idx) => (
                                                                    <li key={idx} className="bg-slate-50 px-4 py-3 rounded-xl border border-slate-100 flex justify-between items-center hover:border-rose-300 transition-colors">
                                                                        <div className="flex items-center gap-3">
                                                                            <span className="text-xs font-bold text-slate-400 w-4">{idx + 1}.</span>
                                                                            <span className="text-sm font-semibold text-slate-700">{s.name}</span>
                                                                        </div>
                                                                        <span className="text-sm font-black text-rose-600 bg-white px-3 py-1 rounded-lg border border-rose-100 shadow-sm">{s.finalScore}</span>
                                                                    </li>
                                                                ))}
                                                                {studentData.filter(s => s.status === 'Belum Tuntas').length === 0 && (
                                                                    <li className="text-sm text-emerald-600 bg-emerald-50 p-4 rounded-xl text-center font-medium">Luar Biasa! Tidak ada peserta yang remedial.</li>
                                                                )}
                                                            </ul>
                                                        </div>
                                                    </div>

                                                    {/* PENGAYAAN BOX */}
                                                    <div className="bg-white rounded-2xl border-2 border-emerald-100 overflow-hidden shadow-sm">
                                                        <div className="bg-emerald-50 px-6 py-4 border-b border-emerald-100 flex justify-between items-center">
                                                            <h3 className="font-bold text-emerald-800 flex items-center"><span className="w-2 h-2 bg-emerald-500 rounded-full mr-2"></span>Peserta Pengayaan</h3>
                                                            <span className="bg-emerald-200 text-emerald-800 text-xs font-bold px-2 py-1 rounded-lg">&ge; {kkm}</span>
                                                        </div>
                                                        <div className="p-6">
                                                            <div className="text-xs text-slate-500 mb-4 pb-4 border-b">
                                                                <strong>Rencana Tindak Lanjut:</strong> Pemberian tugas mandiri, proyek analisis (HOTS), atau bertindak sebagai tutor sebaya.
                                                            </div>
                                                            <ul className="space-y-2 max-h-[500px] overflow-y-auto pr-2">
                                                                {studentData.filter(s => s.status === 'Tuntas').map((s, idx) => (
                                                                    <li key={idx} className="bg-slate-50 px-4 py-3 rounded-xl border border-slate-100 flex justify-between items-center hover:border-emerald-300 transition-colors">
                                                                        <div className="flex items-center gap-3">
                                                                            <span className="text-xs font-bold text-slate-400 w-4">{idx + 1}.</span>
                                                                            <span className="text-sm font-semibold text-slate-700">{s.name}</span>
                                                                        </div>
                                                                        <span className="text-sm font-black text-emerald-600 bg-white px-3 py-1 rounded-lg border border-emerald-100 shadow-sm">{s.finalScore}</span>
                                                                    </li>
                                                                ))}
                                                                {studentData.filter(s => s.status === 'Tuntas').length === 0 && (
                                                                    <li className="text-sm text-rose-600 bg-rose-50 p-4 rounded-xl text-center font-medium">Belum ada peserta yang mencapai batas ketuntasan.</li>
                                                                )}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="text-center p-8 text-slate-400 text-sm font-medium">&copy; 2026 Anabus Pro V11 Ultimate. Didesain untuk kemudahan guru.</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
